server:
  port: 8001

spring:
  application:
    name: auth-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:cloudys}}
    username: ${POSTGRES_USER:cloudys}
    password: ${POSTGRES_PASSWORD:cloudys_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
    eureka:
      client:
        service-url:
          defaultZone: ${EUREKA_SERVER_URL:http://localhost:8888/eureka}
    loadbalancer:
      ribbon:
        enabled: false

jwt:
  secret-key: ${JWT_SECRET_KEY:cloudys-jwt-secret-change-in-production}
  expiry-hours: ${JWT_EXPIRY_HOURS:24}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
