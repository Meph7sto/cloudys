# ================================
# Requirement Analysis Service - Kubernetes 环境配置
# ================================
spring:
  datasource:
    url: jdbc:postgresql://postgresql.semantic-atlas.svc.cluster.local:5432/cloudys
    username: ${POSTGRES_USER:cloudys}
    password: ${POSTGRES_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
  cloud:
    eureka:
      client:
        service-url:
          defaultZone: http://eureka-service.semantic-atlas.svc.cluster.local:8888/eureka

jwt:
  secret-key: ${JWT_SECRET_KEY}
  expiry-hours: 24

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
