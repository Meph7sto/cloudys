server:
  port: 8004

spring:
  application:
    name: requirement-analysis-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:cloudys}}
    username: ${POSTGRES_USER:cloudys}
    password: ${POSTGRES_PASSWORD:cloudys_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: requirement_analysis_flyway_schema_history
    baseline-on-migrate: true
    baseline-version: 0
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
    loadbalancer:
      ribbon:
        enabled: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8888/eureka}

jwt:
  secret-key: ${JWT_SECRET_KEY:cloudys-jwt-secret-change-in-production}
  expiry-hours: ${JWT_EXPIRY_HOURS:24}

services:
  requirement:
    name: requirement-service
  inference:
    name: inference-service

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
