# ================================
# Gateway Service — Test Profile
# ================================
spring:
  cloud:
    discovery:
      enabled: false
    eureka:
      client:
        enabled: false
    gateway:
      routes:
        - id: test-auth
          uri: http://localhost:18001
          predicates:
            - Path=/api/v2/auth/**
        - id: test-permission
          uri: http://localhost:18001
          predicates:
            - Path=/api/v2/permission/**
        - id: test-manage
          uri: http://localhost:18002
          predicates:
            - Path=/api/v2/manage/**
        - id: test-product
          uri: http://localhost:18002
          predicates:
            - Path=/api/v2/product/**
        - id: test-requirements
          uri: http://localhost:18003
          predicates:
            - Path=/api/v2/requirements/**
        - id: test-requirements-compat
          uri: http://localhost:18004
          predicates:
            - Path=/api/v2/requirements/extract_l123,/api/v2/requirements/extract_l123/stream,/api/v2/requirements/session/**,/api/v2/requirements/stats,/api/v2/requirements/l4/**
        - id: test-classification
          uri: http://localhost:18004
          predicates:
            - Path=/api/v2/classification/**
        - id: test-dedup
          uri: http://localhost:18004
          predicates:
            - Path=/api/v2/dedup/**
        - id: test-actor
          uri: http://localhost:18004
          predicates:
            - Path=/api/v2/actor/**
        - id: test-analysis
          uri: http://localhost:18004
          predicates:
            - Path=/api/v2/analysis/**
        - id: test-graph
          uri: http://localhost:18004
          predicates:
            - Path=/api/v2/requirement-graph/**
        - id: test-change
          uri: http://localhost:18004
          predicates:
            - Path=/api/v2/requirement-change/**
        - id: test-inference-chat
          uri: http://localhost:18006
          predicates:
            - Path=/api/v2/inference/chat/**
        - id: test-inference-classification
          uri: http://localhost:18006
          predicates:
            - Path=/api/v2/inference/classification/**
        - id: test-inference-conflict
          uri: http://localhost:18006
          predicates:
            - Path=/api/v2/inference/conflict/**
        - id: test-inference-traceability
          uri: http://localhost:18006
          predicates:
            - Path=/api/v2/inference/traceability/**
        - id: test-inference-kb
          uri: http://localhost:18006
          predicates:
            - Path=/api/v2/inference/kb/**
        - id: test-inference-l4
          uri: http://localhost:18006
          predicates:
            - Path=/api/v2/inference/l4/**
        - id: test-inference-acquisition
          uri: http://localhost:18006
          predicates:
            - Path=/api/v2/inference/acquisition/**
        - id: test-inference-compat
          uri: http://localhost:18006
          predicates:
            - Path=/inference/**
        - id: test-default
          uri: http://localhost:18004
          predicates:
            - Path=/api/v2/**
          order: 100
        # Rate-limit test route — uses default-filters RequestRateLimiter.
        # Path must be under /api/ so JwtGatewayFilter injects X-User-Id.
        - id: ratelimit-test
          uri: http://localhost:19999
          predicates:
            - Path=/api/v2/ratelimit-test/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - name: RequestRateLimiter
          args:
            key-resolver: "#{@userKeyResolver}"
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

jwt:
  secret-key: test-gateway-jwt-secret-minimum-32-chars
  expiry-hours: 1

gateway:
  rate-limit:
    enabled: true
    default:
      replenish-rate: 100
      burst-capacity: 200
      requested-tokens: 1
    routes:
      test-auth:
        replenish-rate: 10
        burst-capacity: 20
      auth-service-auth:
        replenish-rate: 10
        burst-capacity: 20
      test-permission:
        replenish-rate: 10
        burst-capacity: 20
      auth-service-permission:
        replenish-rate: 10
        burst-capacity: 20
      test-inference-chat:
        replenish-rate: 20
        burst-capacity: 30
      inference-service-chat:
        replenish-rate: 20
        burst-capacity: 30
      test-inference-classification:
        replenish-rate: 20
        burst-capacity: 30
      test-inference-conflict:
        replenish-rate: 20
        burst-capacity: 30
      test-inference-traceability:
        replenish-rate: 20
        burst-capacity: 30
      test-inference-kb:
        replenish-rate: 20
        burst-capacity: 30
      test-inference-l4:
        replenish-rate: 20
        burst-capacity: 30
      test-inference-acquisition:
        replenish-rate: 20
        burst-capacity: 30
      test-inference-compat:
        replenish-rate: 20
        burst-capacity: 30
