# ================================
# Gateway Service — Kubernetes 环境配置
# ================================
spring:
  cloud:
    eureka:
      client:
        service-url:
          defaultZone: http://eureka-service.semantic-atlas.svc.cluster.local:8888/eureka

jwt:
  secret-key: ${JWT_SECRET_KEY}
  expiry-hours: 24

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
