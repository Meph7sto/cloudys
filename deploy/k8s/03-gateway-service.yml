# ================================
# Gateway Service — Deployment + Service (NodePort 外部访问)
# ================================
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: semantic-atlas
  labels:
    app: gateway-service
spec:
  type: NodePort
  ports:
    - port: 8008
      targetPort: 8008
      nodePort: 30008
      protocol: TCP
      name: http
  selector:
    app: gateway-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: semantic-atlas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: ${REGISTRY}/gateway-service:${TAG}
          ports:
            - containerPort: 8008
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8008
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8008
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
