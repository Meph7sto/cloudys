# ================================
# PostgreSQL — PV 与 PVC（NFS 持久化存储）
# ================================
# 使用方式:
# 1. 先在 NFS 服务器创建共享目录，例如 /data/nfs/cloudys/postgresql
# 2. 部署前设置环境变量:
#    export NFS_SERVER=192.168.1.10
#    export NFS_PATH=/data/nfs/cloudys/postgresql
# 3. 使用 envsubst 渲染后再 kubectl apply
#
# 说明:
# - PersistentVolume 是集群级资源，不设置 namespace
# - PersistentVolumeClaim 位于 cloudys 命名空间
# ================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
  labels:
    type: nfs
    app: postgresql
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: ${NFS_SERVER}
    path: ${NFS_PATH}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: cloudys
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: ""
  volumeName: postgres-pv
