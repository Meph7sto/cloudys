# ================================
# PostgreSQL — PV 与 PVC（持久化存储）
# ================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
  namespace: semantic-atlas
  labels:
    type: local
    app: postgresql
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /mnt/data/postgresql
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: semantic-atlas
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  selector:
    matchLabels:
      type: local
      app: postgresql
