# ================================
# Requirement Analysis Service - Deployment + Service
# ================================
---
apiVersion: v1
kind: Service
metadata:
  name: requirement-analysis-service
  namespace: cloudys
  labels:
    app: requirement-analysis-service
spec:
  type: ClusterIP
  ports:
    - port: 8004
      targetPort: 8004
      protocol: TCP
      name: http
  selector:
    app: requirement-analysis-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: requirement-analysis-service
  namespace: cloudys
spec:
  replicas: 2
  selector:
    matchLabels:
      app: requirement-analysis-service
  template:
    metadata:
      labels:
        app: requirement-analysis-service
    spec:
      containers:
        - name: requirement-analysis-service
          image: ${REGISTRY}/requirement-analysis-service:${TAG}
          ports:
            - containerPort: 8004
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8004
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8004
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "750m"
