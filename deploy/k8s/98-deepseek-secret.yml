# ================================
# DeepSeek API Secret
# ================================
# 为 inference-service 的 Python sidecar 提供 API 密钥。
# 部署前请替换为实际的 API Key。
---
apiVersion: v1
kind: Secret
metadata:
  name: deepseek-secret
  namespace: cloudys
type: Opaque
stringData:
  DEEPSEEK_API_KEY: your-deepseek-api-key-here
