# ================================
# Eureka Service — Deployment + Service
# ================================
# Service DNS: eureka-service.cloudys.svc.cluster.local:8888
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-service
  namespace: cloudys
  labels:
    app: eureka-service
spec:
  type: ClusterIP
  ports:
    - port: 8888
      targetPort: 8888
      protocol: TCP
      name: http
  selector:
    app: eureka-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-service
  namespace: cloudys
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-service
  template:
    metadata:
      labels:
        app: eureka-service
    spec:
      containers:
        - name: eureka-service
          image: ${REGISTRY}/eureka-service:${TAG}
          ports:
            - containerPort: 8888
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8888
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
