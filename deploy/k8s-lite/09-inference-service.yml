# ================================
# Inference Service — Deployment + Service（推理服务，含 Python Sidecar）
# ================================
---
apiVersion: v1
kind: Service
metadata:
  name: inference-service
  namespace: cloudys
  labels:
    app: inference-service
spec:
  type: ClusterIP
  ports:
    - port: 8006
      targetPort: 8006
      protocol: TCP
      name: http
  selector:
    app: inference-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-service
  namespace: cloudys
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: inference-service
  template:
    metadata:
      labels:
        app: inference-service
    spec:
      containers:
        # Java 推理服务
        - name: inference-service
          image: cloudys/inference-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8006
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms64m -Xmx256m -XX:+UseSerialGC -Djava.security.egd=file:/dev/./urandom"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET_KEY
            - name: PYTHON_BRIDGE_BASE_URL
              value: http://localhost:8000
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8006
            initialDelaySeconds: 90
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8006
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "768Mi"
              cpu: "1000m"

        # Python 推理 Sidecar
        - name: python-sidecar
          image: cloudys/python-sidecar:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: deepseek-secret
                  key: DEEPSEEK_API_KEY
                  optional: true
            - name: DEEPSEEK_API_URL
              value: "https://api.deepseek.com"
            - name: DEEPSEEK_MODEL
              value: "deepseek-v4-pro"
            - name: SKIP_KB_LOAD
              value: "true"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "500m"
