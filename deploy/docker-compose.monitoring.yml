# ================================
# Prometheus + Grafana 监控栈 (可选)
# ================================
# 启动: docker compose -f docker-compose.yml -f deploy/docker-compose.monitoring.yml up -d
# ================================

services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: cloudys-prometheus
    restart: unless-stopped
    ports:
      - "${HOST_PROMETHEUS_PORT:-25709}:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  grafana:
    image: grafana/grafana:11.3.0
    container_name: cloudys-grafana
    restart: unless-stopped
    ports:
      - "${HOST_GRAFANA_PORT:-25710}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
