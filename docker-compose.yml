services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudys-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudys_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cloudys}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka:
    image: eclipse-temurin:17-jre-alpine
    container_name: cloudys-eureka
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - ./services/eureka-service/target/eureka-service-1.0.0-SNAPSHOT.jar:/app/eureka-service.jar
    working_dir: /app
    command: ["java", "-jar", "eureka-service.jar"]
    environment:
      EUREKA_HOST: cloudys-eureka
      EUREKA_SELF_PRESERVATION: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  python-sidecar:
    build:
      context: ../Semantic-Atlas/backend_inference
      dockerfile: ../../cloudys/deploy/docker/Dockerfile.python-sidecar
    container_name: cloudys-python-sidecar
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_API_URL=${DEEPSEEK_API_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-v4-pro}
      - SKIP_KB_LOAD=${SKIP_KB_LOAD:-true}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  inference-service:
    image: eclipse-temurin:17-jre-alpine
    container_name: cloudys-inference
    restart: unless-stopped
    ports:
      - "8006:8006"
    depends_on:
      eureka:
        condition: service_healthy
      python-sidecar:
        condition: service_healthy
    volumes:
      - ./services/inference-service/target/inference-service-1.0.0-SNAPSHOT.jar:/app/inference-service.jar
    working_dir: /app
    command: ["java", "-jar", "inference-service.jar"]
    environment:
      EUREKA_SERVER_URL: http://cloudys-eureka:8888/eureka
      PYTHON_BRIDGE_BASE_URL: http://cloudys-python-sidecar:8000

  # ========================
  # Business Services
  # ========================
  auth-service:
    image: eclipse-temurin:17-jre-alpine
    container_name: cloudys-auth
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy
    volumes:
      - ./services/auth-service/target/auth-service-1.0.0-SNAPSHOT.jar:/app/auth-service.jar
    working_dir: /app
    command: ["java", "-jar", "auth-service.jar"]
    environment:
      EUREKA_SERVER_URL: http://cloudys-eureka:8888/eureka
      POSTGRES_HOST: cloudys-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-cloudys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudys_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cloudys}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-cloudys-jwt-secret-change-in-production}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  project-service:
    image: eclipse-temurin:17-jre-alpine
    container_name: cloudys-project
    restart: unless-stopped
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy
    volumes:
      - ./services/project-service/target/project-service-1.0.0-SNAPSHOT.jar:/app/project-service.jar
    working_dir: /app
    command: ["java", "-jar", "project-service.jar"]
    environment:
      EUREKA_SERVER_URL: http://cloudys-eureka:8888/eureka
      POSTGRES_HOST: cloudys-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-cloudys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudys_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cloudys}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-cloudys-jwt-secret-change-in-production}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  requirement-service:
    image: eclipse-temurin:17-jre-alpine
    container_name: cloudys-requirement
    restart: unless-stopped
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    volumes:
      - ./services/requirement-service/target/requirement-service-1.0.0-SNAPSHOT.jar:/app/requirement-service.jar
    working_dir: /app
    command: ["java", "-jar", "requirement-service.jar"]
    environment:
      EUREKA_SERVER_URL: http://cloudys-eureka:8888/eureka
      POSTGRES_HOST: cloudys-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-cloudys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudys_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cloudys}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-cloudys-jwt-secret-change-in-production}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8003/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  requirement-analysis-service:
    image: eclipse-temurin:17-jre-alpine
    container_name: cloudys-analysis
    restart: unless-stopped
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy
    volumes:
      - ./services/requirement-analysis-service/target/requirement-analysis-service-1.0.0-SNAPSHOT.jar:/app/requirement-analysis-service.jar
    working_dir: /app
    command: ["java", "-jar", "requirement-analysis-service.jar"]
    environment:
      EUREKA_SERVER_URL: http://cloudys-eureka:8888/eureka
      POSTGRES_HOST: cloudys-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-cloudys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudys_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cloudys}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-cloudys-jwt-secret-change-in-production}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8004/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  gateway-service:
    image: eclipse-temurin:17-jre-alpine
    container_name: cloudys-gateway
    restart: unless-stopped
    ports:
      - "8008:8008"
    depends_on:
      eureka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      project-service:
        condition: service_healthy
    volumes:
      - ./services/gateway-service/target/gateway-service-1.0.0-SNAPSHOT.jar:/app/gateway-service.jar
    working_dir: /app
    command: ["java", "-jar", "gateway-service.jar"]
    environment:
      EUREKA_SERVER_URL: http://cloudys-eureka:8888/eureka
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-cloudys-jwt-secret-change-in-production}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8008/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  adminer:
    image: adminer
    container_name: cloudys-adminer
    restart: always
    ports:
      - 8080:8080
    environment:
      ADMINER_DESIGN: "pappu687"

volumes:
  postgres_data:
